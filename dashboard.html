<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>User Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="dashboard-container">


    <!-- Header -->

    <div class="dashboard-header">


        <div>

            <h2 id="welcomeMessage">
                
            </h2>


            <p id="roleMessage"></p>


        </div>



        <button class="logout-btn" onclick="logout()">

            Logout

        </button>


    </div>




    <!-- Action Buttons -->


    <div class="action-section">


        <button onclick="showExistingUsers()">

            Show Existing User

        </button>



        <button 
        id="downloadBtn"
        onclick="downloadCSV()">

            Download CSV

        </button>


    </div>





    <!-- User Table -->


    <div class="table-container">


        <table>


            <thead>


                <tr>

                    <th>
                        First Name
                    </th>


                    <th>
                        Last Name
                    </th>


                    <th>
                        Email
                    </th>


                    <th>
                        Mobile Number
                    </th>


                </tr>


            </thead>



            <tbody id="userTable">


            </tbody>


        </table>


    </div>



</div>



<script src="js/dashboard.js"></script>


</body>


</html>
